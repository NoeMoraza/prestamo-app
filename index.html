<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Préstamo</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
    --bg: #0b0f1a;
    --card: #121826;
    --accent: #3b82f6;
    --text: #ffffff;
    --sub: #9ca3af;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    padding: 20px;
}

.header {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 20px;
}

.card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    animation: fadeIn 0.6s ease;
}

.title {
    color: var(--sub);
    font-size: 14px;
}

.amount {
    font-size: 28px;
    font-weight: bold;
    margin-top: 5px;
}

.progress-bar {
    height: 10px;
    background: #1f2937;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 15px;
}

.progress {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    width: 0%;
    transition: width 0.6s ease;
}

.button {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    margin-top: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.pay {
    background: var(--accent);
    color: white;
}

.reset {
    background: #1f2937;
    color: var(--sub);
}

.button:active {
    transform: scale(0.97);
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">Mi préstamo</div>

    <div class="card">
        <div class="title">Pagado</div>
        <div class="amount" id="pagado">0 €</div>

        <div class="progress-bar">
            <div class="progress" id="barra"></div>
        </div>
    </div>

    <div class="card">
        <div class="title">Restante</div>
        <div class="amount" id="restante">11000 €</div>
    </div>

    <div class="card">
        <div class="title">Cuotas pagadas</div>
        <div class="amount" id="cuotas">0</div>
    </div>

    <button class="button pay" onclick="pagar()">He pagado este mes</button>
    <button class="button reset" onclick="reset()">Resetear</button>

</div>

<script>
let total = 11000;
let cuota = 230;

let pagos = JSON.parse(localStorage.getItem("pagos")) || 0;

function actualizar() {
    let pagado = pagos * cuota;
    let restante = total - pagado;
    let progreso = (pagado / total) * 100;

    document.getElementById("pagado").innerText = pagado + " €";
    document.getElementById("restante").innerText = restante + " €";
    document.getElementById("cuotas").innerText = pagos;
    document.getElementById("barra").style.width = progreso + "%";
}

function pagar() {
    pagos++;
    localStorage.setItem("pagos", pagos);
    actualizar();
}

function reset() {
    pagos = 0;
    localStorage.setItem("pagos", pagos);
    actualizar();
}

actualizar();
</script>

</body>
</html>
